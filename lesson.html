<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tutoring Lesson</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    header { padding: 12px 16px; border-bottom: 1px solid #ddd; }
    #meet { height: calc(100vh - 58px); }
  </style>
</head>
<body>
  <header>
    <strong>Tutoring Lesson</strong>
    <span id="status">Loading...</span>
  </header>

  <div id="meet"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const student = params.get("student") || "general";
    const isTeacher = params.get("teacher") === "1";
    const pin = params.get("pin") || "";

    async function start() {
      const tokenRes = await fetch(`/token?student=${encodeURIComponent(student)}&teacher=${isTeacher ? "1" : "0"}&pin=${encodeURIComponent(pin)}`);
      if (!tokenRes.ok) {
        document.getElementById("status").textContent = "Could not create meeting token.";
        return;
      }

      const { jwt, appId, room } = await tokenRes.json();

      const script = document.createElement("script");
      script.src = `https://8x8.vc/${appId}/external_api.js`;
      script.onload = () => {
        document.getElementById("status").textContent = isTeacher
          ? "Teacher view"
          : "Student view";

        new JitsiMeetExternalAPI("8x8.vc", {
          roomName: `${appId}/${room}`,
          jwt,
          parentNode: document.querySelector("#meet"),
          width: "100%",
          height: "100%",
          configOverwrite: {
            prejoinPageEnabled: true,
            startWithAudioMuted: true,
            startWithVideoMuted: true
          },
          interfaceConfigOverwrite: {
            SHOW_JITSI_WATERMARK: false
          }
        });
      };

      document.body.appendChild(script);
    }

    start();
  </script>
</body>
</html>
